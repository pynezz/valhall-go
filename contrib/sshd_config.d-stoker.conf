# /etc/ssh/sshd_config.d/50-stoker.conf  (RHEL 8: include dir supported)
# Alternative to changing the login shell: force stoker for one group.
# Members get the persistent TUI on every login; scp/sftp still work
# because ForceCommand only replaces the interactive command.
#
# Match Group stoker-ops
#     ForceCommand /usr/bin/stoker --attach
#
# Keep sessions from piling up server-side on flaky links (not a
# concern on a reliable LAN, but harmless):
# ClientAliveInterval 60
# ClientAliveCountMax 5
